<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Rose Day</title>
<style>
    body {
        margin: 0;
        height: 100vh;
        background: radial-gradient(circle at top, #1b1b1b, #000);
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: 'Georgia', serif;
        overflow: hidden;
    }

    .rose-container {
        text-align: center;
        animation: fadeIn 2s ease forwards;
    }

    .rose {
        width: 150px;
        height: 150px;
        background: radial-gradient(circle, #ff4d6d, #b00020);
        border-radius: 50%;
        position: relative;
        transform: scale(0);
        animation: bloom 2.5s ease forwards;
    }

    .rose::before,
    .rose::after {
        content: '';
        position: absolute;
        width: 150px;
        height: 150px;
        background: radial-gradient(circle, #ff4d6d, #900018);
        border-radius: 50%;
    }

    .rose::before {
        transform: rotate(45deg);
    }

    .rose::after {
        transform: rotate(-45deg);
    }

    h1 {
        margin-top: 30px;
        color: #ffccd5;
        letter-spacing: 2px;
        opacity: 0;
        animation: textFade 2s ease forwards;
        animation-delay: 2.5s;
    }

    @keyframes bloom {
        0% {
            transform: scale(0);
        }
        100% {
            transform: scale(1);
        }
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
        }
        to {
            opacity: 1;
        }
    }

    @keyframes textFade {
        to {
            opacity: 1;
        }
    }
</style>
</head>
<body>

<div class="rose-container">
    <div class="rose"></div>
    <h1>Happy Rose Day 🌹</h1>
</div>

</body>
</html>
