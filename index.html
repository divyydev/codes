<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Rose Day</title>

<style>
body{
  margin:0;
  height:200vh;
  background:linear-gradient(#050505,#1a0005);
  font-family:Georgia, serif;
  color:#ffd6dc;
}

.center{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
}

.rose{
  position:relative;
  width:140px;
  height:140px;
}

.petal{
  position:absolute;
  width:140px;
  height:140px;
  background:radial-gradient(circle,#ff4d6d,#900020);
  border-radius:50%;
  transform-origin:center;
  transition:transform 0.1s linear;
}

/* closed state */
.p1{ transform:scale(0.3) rotate(0deg); }
.p2{ transform:scale(0.3) rotate(60deg); }
.p3{ transform:scale(0.3) rotate(120deg); }

h1{
  text-align:center;
  margin-top:180px;
  font-size:1.8rem;
}
</style>
</head>

<body>

<div class="center">
  <div class="rose">
    <div class="petal p1"></div>
    <div class="petal p2"></div>
    <div class="petal p3"></div>
  </div>
  <h1>Scroll Up 🌹</h1>
</div>

<script>
let lastScroll = window.scrollY;

window.addEventListener("scroll",()=>{
  let current = window.scrollY;
  let progress = Math.max(0,1 - current/300);

  document.querySelectorAll(".petal").forEach((p,i)=>{
    p.style.transform =
      `scale(${0.3 + progress*0.7}) rotate(${i*60}deg)`;
  });

  lastScroll = current;
});
</script>

</body>
</html>
